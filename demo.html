<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Code on Web — Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    h1 {
      font-size: 2rem;
      background: linear-gradient(135deg, #d97706, #f59e0b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
    }
    .subtitle { color: #888; margin-bottom: 2rem; }
    .card {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 12px;
      padding: 1.5rem;
      width: 100%;
      max-width: 500px;
      margin-bottom: 1rem;
    }
    .card h2 { font-size: 1.1rem; margin-bottom: 1rem; color: #f59e0b; }
    button {
      background: #d97706;
      color: white;
      border: none;
      padding: 0.6rem 1.2rem;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.95rem;
      transition: background 0.2s;
    }
    button:hover { background: #b45309; }
    #counter-display { font-size: 3rem; text-align: center; margin: 1rem 0; }
    #todo-input {
      width: 100%;
      padding: 0.5rem;
      border-radius: 8px;
      border: 1px solid #2a2a4a;
      background: #0f0f1a;
      color: #e0e0e0;
      font-size: 0.95rem;
      margin-bottom: 0.5rem;
    }
    #todo-list { list-style: none; margin-top: 0.5rem; }
    #todo-list li {
      padding: 0.4rem 0;
      border-bottom: 1px solid #2a2a4a;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    #todo-list li.done span { text-decoration: line-through; color: #666; }
    .delete-btn {
      background: #991b1b;
      padding: 0.2rem 0.6rem;
      font-size: 0.8rem;
    }
    .btn-group { display: flex; gap: 0.5rem; justify-content: center; }
    #clock { font-size: 2rem; text-align: center; font-variant-numeric: tabular-nums; }
    footer { margin-top: 2rem; color: #555; font-size: 0.8rem; }
  </style>
</head>
<body>
  <h1>Built by Claude Code on Web</h1>
  <p class="subtitle">A small interactive demo — written, tested &amp; deployed in one session</p>

  <div class="card">
    <h2>Live Clock</h2>
    <div id="clock">--:--:--</div>
  </div>

  <div class="card">
    <h2>Counter</h2>
    <div id="counter-display">0</div>
    <div class="btn-group">
      <button onclick="changeCount(-1)">− 1</button>
      <button onclick="changeCount(1)">+ 1</button>
      <button onclick="resetCount()">Reset</button>
    </div>
  </div>

  <div class="card">
    <h2>Quick To-Do</h2>
    <input id="todo-input" placeholder="Type a task and press Enter" onkeydown="if(event.key==='Enter') addTodo()">
    <button onclick="addTodo()">Add</button>
    <ul id="todo-list"></ul>
  </div>

  <footer>Powered by Claude Code — claude.ai/code</footer>

  <script>
    // Clock
    function updateClock() {
      const now = new Date();
      document.getElementById('clock').textContent =
        now.toLocaleTimeString('en-US', { hour12: true });
    }
    setInterval(updateClock, 1000);
    updateClock();

    // Counter
    let count = 0;
    function changeCount(delta) {
      count += delta;
      document.getElementById('counter-display').textContent = count;
    }
    function resetCount() {
      count = 0;
      document.getElementById('counter-display').textContent = 0;
    }

    // To-Do
    function addTodo() {
      const input = document.getElementById('todo-input');
      const text = input.value.trim();
      if (!text) return;
      const li = document.createElement('li');
      const span = document.createElement('span');
      span.textContent = text;
      span.onclick = () => li.classList.toggle('done');
      const del = document.createElement('button');
      del.textContent = '✕';
      del.className = 'delete-btn';
      del.onclick = () => li.remove();
      li.append(span, del);
      document.getElementById('todo-list').appendChild(li);
      input.value = '';
    }
  </script>
</body>
</html>
